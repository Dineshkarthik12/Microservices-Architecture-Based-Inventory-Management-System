worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    # access_log /var/log/nginx/access.log main;
    # error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # ── Upstream definitions ─────────────────────────────────────
    upstream auth_backend {
        server auth-service:8000;
        keepalive 16;
    }
    upstream inventory_backend {
        server inventory-service:8000;
        keepalive 16;
    }
    upstream order_backend {
        server order-service:8000;
        keepalive 16;
    }
    upstream notification_backend {
        server notification-service:8000;
        keepalive 16;
    }

    server {
        listen 8000;
        server_name _;

        # ── CORS (mirrors your current allow_origins=["*"]) ──────
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Health check ─────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Auth service (public — no JWT check) ─────────────────
        location /auth/ {
            proxy_pass http://auth_backend/;
            include /etc/nginx/proxy_params.conf;
        }

        # Public: GET product listing
        # Public: GET product listing
        location = /inventory/products {
            if ($request_method != GET) {
                rewrite ^ /internal_protected_products last;
            }
            proxy_set_header X-User-Id "";
            proxy_set_header X-Role    "";
            proxy_pass http://inventory_backend/products;
            include /etc/nginx/proxy_params.conf;
        }

        location = /internal_protected_products {
            internal;
            auth_request /internal/auth/validate;
            auth_request_set $x_user_id $upstream_http_x_user_id;
            auth_request_set $x_role    $upstream_http_x_role;
            proxy_set_header X-User-Id $x_user_id;
            proxy_set_header X-Role    $x_role;
            proxy_pass http://inventory_backend/products;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Protected routes: validate JWT first ─────────────────
        location /inventory/ {
            auth_request /internal/auth/validate;
            auth_request_set $x_user_id $upstream_http_x_user_id;
            auth_request_set $x_role    $upstream_http_x_role;

            proxy_set_header X-User-Id $x_user_id;
            proxy_set_header X-Role    $x_role;

            proxy_pass http://inventory_backend/;
            include /etc/nginx/proxy_params.conf;
        }

        location /orders/ {
            auth_request /internal/auth/validate;
            auth_request_set $x_user_id $upstream_http_x_user_id;
            auth_request_set $x_role    $upstream_http_x_role;

            proxy_set_header X-User-Id $x_user_id;
            proxy_set_header X-Role    $x_role;

            proxy_pass http://order_backend/;
            include /etc/nginx/proxy_params.conf;
        }

        location /notify/ {
            auth_request /internal/auth/validate;
            auth_request_set $x_user_id $upstream_http_x_user_id;
            auth_request_set $x_role    $upstream_http_x_role;

            proxy_set_header X-User-Id $x_user_id;
            proxy_set_header X-Role    $x_role;

            proxy_pass http://notification_backend/;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Internal auth subrequest endpoint ────────────────────
        location = /internal/auth/validate {
            internal;
            proxy_pass http://auth_backend/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
        }
    }
}
