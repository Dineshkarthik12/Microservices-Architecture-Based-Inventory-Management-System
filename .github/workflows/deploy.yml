name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  AR_REPO: ims-repo
  SQL_INSTANCE: ims-mysql

jobs:
  # ── Build & Push all Docker images ─────────────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    strategy:
      matrix:
        service:
          - name: auth-service
            context: services/auth-service
          - name: inventory-service
            context: services/inventory-service
          - name: order-service
            context: services/order-service
          - name: notification-service
            context: services/notification-service
          - name: gateway
            context: services/gateway

    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ matrix.service.name }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ matrix.service.name }}:latest"
          docker build -t "${IMAGE}" -t "${IMAGE_LATEST}" ${{ matrix.service.context }}
          docker push "${IMAGE}"
          docker push "${IMAGE_LATEST}"

  # ── Build & Push frontend (separate because of build args) ─────────────────
  build-push-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-backend]  # Need gateway URL for the build arg
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Gateway URL
        id: gateway-url
        run: |
          URL=$(gcloud run services describe gateway \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push frontend
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }}"
          IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:latest"
          docker build \
            --build-arg VITE_API_BASE_URL=${{ steps.gateway-url.outputs.url }} \
            -t "${IMAGE}" -t "${IMAGE_LATEST}" \
            frontend
          docker push "${IMAGE}"
          docker push "${IMAGE_LATEST}"

  # ── Deploy backend services ────────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [build-push]
    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Cloud SQL connection name
        id: sql
        run: |
          CONN=$(gcloud sql instances describe ${{ env.SQL_INSTANCE }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(connectionName)')
          echo "connection=${CONN}" >> "$GITHUB_OUTPUT"

      # Deploy services in dependency order
      - name: Deploy auth-service
        run: |
          gcloud run deploy auth-service \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/auth-service:${{ github.sha }} \
            --platform=managed --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --port=8000 --allow-unauthenticated \
            --add-cloudsql-instances=${{ steps.sql.outputs.connection }} \
            --set-env-vars="DATABASE_URL=mysql://root:${{ secrets.MYSQL_ROOT_PASSWORD }}@localhost/auth_db?socketPath=/cloudsql/${{ steps.sql.outputs.connection }},JWT_SECRET=${{ secrets.JWT_SECRET }},JWT_ALGORITHM=HS256,JWT_EXPIRE_MINUTES=120,SERVICE_NAME=auth-service" \
            --min-instances=0 --max-instances=3 --memory=512Mi --cpu=1 --quiet

      - name: Deploy inventory-service
        run: |
          gcloud run deploy inventory-service \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/inventory-service:${{ github.sha }} \
            --platform=managed --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --port=8000 --allow-unauthenticated \
            --add-cloudsql-instances=${{ steps.sql.outputs.connection }} \
            --set-env-vars="DATABASE_URL=mysql://root:${{ secrets.MYSQL_ROOT_PASSWORD }}@localhost/inventory_db?socketPath=/cloudsql/${{ steps.sql.outputs.connection }},SERVICE_NAME=inventory-service" \
            --min-instances=0 --max-instances=3 --memory=512Mi --cpu=1 --quiet

      - name: Deploy notification-service
        run: |
          gcloud run deploy notification-service \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/notification-service:${{ github.sha }} \
            --platform=managed --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --port=8000 --allow-unauthenticated \
            --set-env-vars="SMTP_HOST=${{ secrets.SMTP_HOST }},SMTP_PORT=587,SMTP_USERNAME=${{ secrets.SMTP_USERNAME }},SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }},SMTP_FROM=${{ secrets.SMTP_FROM }},SERVICE_NAME=notification-service" \
            --min-instances=0 --max-instances=2 --memory=256Mi --cpu=1 --quiet

      - name: Deploy order-service
        id: deploy-order
        run: |
          INVENTORY_URL=$(gcloud run services describe inventory-service --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')
          NOTIFICATION_URL=$(gcloud run services describe notification-service --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')
          gcloud run deploy order-service \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/order-service:${{ github.sha }} \
            --platform=managed --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --port=8000 --allow-unauthenticated \
            --add-cloudsql-instances=${{ steps.sql.outputs.connection }} \
            --set-env-vars="DATABASE_URL=mysql://root:${{ secrets.MYSQL_ROOT_PASSWORD }}@localhost/order_db?socketPath=/cloudsql/${{ steps.sql.outputs.connection }},INVENTORY_SERVICE_URL=${INVENTORY_URL},NOTIFICATION_SERVICE_URL=${NOTIFICATION_URL},SERVICE_NAME=order-service" \
            --min-instances=0 --max-instances=3 --memory=512Mi --cpu=1 --quiet

      - name: Deploy gateway
        run: |
          AUTH_URL=$(gcloud run services describe auth-service --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')
          INVENTORY_URL=$(gcloud run services describe inventory-service --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')
          ORDER_URL=$(gcloud run services describe order-service --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')
          NOTIFICATION_URL=$(gcloud run services describe notification-service --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')
          gcloud run deploy gateway \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/gateway:${{ github.sha }} \
            --platform=managed --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --port=8000 --allow-unauthenticated \
            --set-env-vars="AUTH_SERVICE_URL=${AUTH_URL},INVENTORY_SERVICE_URL=${INVENTORY_URL},ORDER_SERVICE_URL=${ORDER_URL},NOTIFICATION_SERVICE_URL=${NOTIFICATION_URL},JWT_SECRET=${{ secrets.JWT_SECRET }},JWT_ALGORITHM=HS256,SERVICE_NAME=gateway" \
            --min-instances=0 --max-instances=5 --memory=512Mi --cpu=1 --quiet

  # ── Deploy frontend ────────────────────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [build-push-frontend]
    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy frontend
        run: |
          GATEWAY_URL=$(gcloud run services describe gateway --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')
          gcloud run deploy frontend \
            --image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ github.sha }} \
            --platform=managed --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --port=80 --allow-unauthenticated \
            --set-env-vars="VITE_API_BASE_URL=${GATEWAY_URL}" \
            --min-instances=0 --max-instances=3 --memory=256Mi --cpu=1 --quiet

      - name: Print URLs
        run: |
          echo "===== Deployment Complete ====="
          echo "Frontend: $(gcloud run services describe frontend --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')"
          echo "Gateway:  $(gcloud run services describe gateway --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')"
          echo "==============================="
